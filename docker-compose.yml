version: "3.9"

services:
  video-translation:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: video_translation_app
    ports:
      - "8501:8501"
    volumes:
      # Mount the entire project into /app so ANY file change locally
      # is instantly reflected inside the running container (live reload).
      - .:/app
      # Persist the workspace output (translated videos, audio) across restarts
      - ./workspace:/app/workspace
      # Writable cache for HuggingFace model downloads (whisper, pyannote, etc.)
      # Uses a host bind-mount so Docker's internal volume store is not needed.
      - ./.cache/huggingface:/root/.cache/huggingface
      # Writable cache for TTS (Coqui) models
      - ./.cache/tts:/root/.local/share/tts
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_HEADLESS=true
      - COQUI_TOS_AGREED=1
    restart: unless-stopped
